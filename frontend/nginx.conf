server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: unknown routes serve index.html (Angular router handles them).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: if you deploy the API behind the same domain, proxy /api to it.
  # location /api/ {
  #   proxy_pass http://backend:8001;
  #   proxy_set_header Host $host;
  # }
}
